<!DOCTYPE html>
<html>
<head>
    <title>Connexion - Chat Passion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff4e8b, #ff003c);
        }

        .card {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            margin-bottom: 15px;
            color: #ff003c;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        input:focus {
            border: 1px solid #ff4e8b;
        }

        input[type="file"] {
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff4e8b, #ff003c);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        .divider {
            margin: 15px 0;
            font-size: 13px;
            color: gray;
        }

        .preview {
            margin-top: 10px;
        }

        .preview img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="card">

    <h2>💖 Connexion</h2>

    <form method="POST">
        <input name="username" placeholder="Nom" required>
        <input type="password" name="password" placeholder="Mot de passe" required>
        <button type="submit">Se connecter</button>
    </form>

    <div class="divider">ou créer un compte</div>

    <form action="/register" method="POST" enctype="multipart/form-data">
        <input name="username" placeholder="Nom" required>
        <input type="password" name="password" placeholder="Mot de passe" required>
        <input type="file" name="profile_pic" accept="image/*" onchange="previewImage(event)">
        <div class="preview" id="preview"></div>
        <button type="submit">Créer un compte</button>
    </form>

</div>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        const output = document.createElement('img');
        output.src = reader.result;
        const preview = document.getElementById('preview');
        preview.innerHTML = "";
        preview.appendChild(output);
    };
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
