<script>
const socket = io();
const username = "{{ username }}";

function getCurrentTime() {
    const now = new Date();
    return now.getHours().toString().padStart(2, '0') + ":" +
           now.getMinutes().toString().padStart(2, '0');
}

function addMessage(msg) {
    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "message " + (msg.username === username ? "right" : "left");

    const name = document.createElement("div");
    name.className = "username";
    name.textContent = msg.username;

    const text = document.createElement("div");
    text.className = "text";
    text.textContent = msg.text;

    const time = document.createElement("div");
    time.className = "time";
    time.textContent = getCurrentTime();

    div.appendChild(name);
    div.appendChild(text);
    div.appendChild(time);

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

socket.on("receive_message", function(msg) {
    addMessage(msg);

    if(msg.username !== username){
        socket.emit("message_seen", { username: msg.username });
    }
});

socket.on("message_seen", function(data) {
    if(data.username === username){
        const messages = document.querySelectorAll(".message.right");
        if(messages.length > 0){
            const last = messages[messages.length - 1];

            if(!last.querySelector(".seen")){
                const seen = document.createElement("div");
                seen.className = "seen";
                seen.textContent = "✔✔ vu";
                last.appendChild(seen);
            }
        }
    }
});

function sendMessage() {
    const input = document.getElementById("message");

    if(input.value.trim() === "") return;

    socket.emit("send_message", {
        username: username,
        text: input.value
    });

    input.value = "";
}
</script>
